<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MASTERCLASS" />
    <title>MASTER CLASS</title>

    <!-- Preconnect to speed up font and asset loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload the logo shown on the first screen -->
    <link rel="preload" as="image" href="/masterclass-logo.png" type="image/png" />

    <!-- Load the font without blocking the splash screen -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" />

    <!-- Inline splash screen: shown immediately while the PWA loads -->
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0A0A0A; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0A0A0A;
        transition: opacity 0.3s ease;
      }
      #splash img { width: 140px; height: auto; object-fit: contain; }
      #splash.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/masterclass-logo.png" alt="MASTERCLASS" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
